<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Quiniela</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; text-align: center; }
        input { padding: 15px; width: 80%; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; text-align: center; }
        button { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 Panel de Administrador</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<p style="color: red;">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        <form action="/admin/login" method="post">
            <input type="password" name="password" placeholder="Contraseña Maestra" required>
            <br>
            <button type="submit">Ingresar</button>
        </form>
    </div>
</body>
</html>
