<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Quiniela</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px;}
        input { padding: 15px; width: 85%; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; text-align: center; font-family: inherit;}
        input:focus { border-color: #004a99; outline: none; }
        button { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; width: 95%; transition: 0.3s;}
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #333; margin-top: 0;">🔒 Panel Admin</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}<p style="color: red; font-weight: 600; font-size: 14px;">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        
        <form action="/admin/login" method="post">
            <input type="text" name="user" placeholder="Usuario" required>
            <br>
            <input type="password" name="password" placeholder="Contraseña Maestra" required>
            <br>
            <button type="submit">Ingresar</button>
        </form>
        
        <div style="margin-top: 25px;">
            <a href="/" style="color: #999; text-decoration: none; font-size: 12px;">← Volver a la Quiniela</a>
        </div>
    </div>
</body>
</html>
